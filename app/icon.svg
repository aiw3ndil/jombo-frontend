<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="120" fill="#e8f5e9"/>
  <rect x="20" y="20" width="472" height="472" rx="100" stroke="#a5d6a7" stroke-width="12"/>
  
  <!-- Stylized J inspired by the logo -->
  <g transform="translate(100, 80) scale(1.8)">
    <path d="M70 40 L70 140 Q70 180 110 180" stroke="#2d7d32" stroke-width="25" stroke-linecap="round" fill="none"/>
    <circle cx="70" cy="15" r="15" fill="#2d7d32"/>
    
    <!-- Small car accent like in the header logo -->
    <g transform="translate(120, 50)">
      <rect x="0" y="20" width="60" height="25" rx="8" fill="#4caf50"/>
      <circle cx="15" cy="45" r="7" fill="#2d7d32"/>
      <circle cx="45" cy="45" r="7" fill="#2d7d32"/>
    </g>
  </g>
</svg>